<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis clases — NŌVA Pilates Studio</title>
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="index.html" class="sidebar-logo-text">NŌV<em>A</em> PILATES</a></div>
    <nav class="sidebar-nav">
      <a href="dashboard_cliente.html" class="sidebar-link">Inicio</a>
      <a href="calendario.html" class="sidebar-link">Reservar clase</a>
      <a href="mis-clases.html" class="sidebar-link active">Mis clases</a>
      <a href="bono.html" class="sidebar-link">Mi bono</a>
      <a href="notificaciones.html" class="sidebar-link">Notificaciones</a>
      <a href="perfil.html" class="sidebar-link">Mi perfil</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar"><span class="topbar-title">Mis clases</span></header>
    <div class="content">
      <div class="card">
        <div class="card-label">Historial y próximas</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Clase</th><th>Fecha</th><th>Estado</th></tr></thead>
            <tbody id="rows"><tr><td colspan="3">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function init() {
      const session = await getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      const perfil = await getUserProfile(session.user.id);
      const { data, error } = await novaSupabase
        .from('reservas')
        .select('estado, clase:clase_id(fecha_hora, titulo, disciplina:disciplina_id(nombre))')
        .eq('perfil_id', perfil.id)
        .order('fecha_reserva', { ascending: false })
        .limit(50);
      if (error) throw error;
      const tb = document.getElementById('rows');
      tb.innerHTML = '';
      if (!data?.length) {
        tb.innerHTML = '<tr><td colspan="3">No tienes clases aún.</td></tr>';
        return;
      }
      data.forEach((r) => {
        const tr = document.createElement('tr');
        const estado = r.estado === 'confirmada' ? '<span class="badge badge-success">Confirmada</span>' :
                      r.estado === 'cancelada' ? '<span class="badge badge-danger">Cancelada</span>' :
                      r.estado === 'asistida' ? '<span class="badge badge-accent">Asistida</span>' :
                      `<span class="badge badge-neutral">${r.estado}</span>`;
        tr.innerHTML = `
          <td>${r.clase?.titulo || r.clase?.disciplina?.nombre || 'Clase'}</td>
          <td>${new Date(r.clase?.fecha_hora).toLocaleString('es-ES')}</td>
          <td>${estado}</td>`;
        tb.appendChild(tr);
      });
    }
    init().catch((e) => {
      document.getElementById('rows').innerHTML = `<tr><td colspan="3">Error: ${e.message}</td></tr>`;
    });
  </script>
</body>
</html>
