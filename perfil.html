<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — NŌVA Pilates Studio</title>
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="index.html" class="sidebar-logo-text">NŌV<em>A</em> PILATES</a></div>
    <nav class="sidebar-nav">
      <a href="dashboard_cliente.html" class="sidebar-link">Inicio</a>
      <a href="calendario.html" class="sidebar-link">Reservar clase</a>
      <a href="mis-clases.html" class="sidebar-link">Mis clases</a>
      <a href="bono.html" class="sidebar-link">Mi bono</a>
      <a href="notificaciones.html" class="sidebar-link">Notificaciones</a>
      <a href="perfil.html" class="sidebar-link active">Mi perfil</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar"><span class="topbar-title">Mi perfil</span></header>
    <div class="content">
      <div class="card">
        <div class="card-label">Datos personales</div>
        <div id="perfilInfo">Cargando...</div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function init() {
      const session = await getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      const p = await getUserProfile(session.user.id);
      document.getElementById('perfilInfo').innerHTML = `
        <p><strong>Nombre:</strong> ${p.nombre || '-'}</p>
        <p><strong>Apellidos:</strong> ${p.apellidos || '-'}</p>
        <p><strong>Email:</strong> ${p.email || '-'}</p>
        <p><strong>Teléfono:</strong> ${p.telefono || '-'}</p>
        <p><strong>Rol:</strong> ${p.rol || '-'}</p>
        <p style="margin-top:1rem;color:var(--color-muted);font-size:.8rem;">Si quieres, en el siguiente paso te hago formulario editable de perfil.</p>`;
    }
    init().catch((e) => {
      document.getElementById('perfilInfo').innerHTML = `<p style="color:var(--color-danger)">Error: ${e.message}</p>`;
    });
  </script>
</body>
</html>
